<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Ori:Dev — SSH Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Light Chrome */
    --chrome-bg: #FFFFFF;
    --chrome-border: #E5E7EB;
    --chrome-text: #111827;
    --chrome-text-secondary: #6B7280;
    --chrome-surface: #F3F4F6;
    --chrome-surface-hover: #E5E7EB;

    /* Accent */
    --accent: #6366F1;
    --accent-hover: #4F46E5;
    --accent-light: #EEF2FF;
    --accent-text: #FFFFFF;

    /* Terminal (Tokyo Night) */
    --term-bg: #1A1B26;
    --term-fg: #A9B1D6;
    --term-green: #9ECE6A;
    --term-red: #F7768E;
    --term-yellow: #E0AF68;
    --term-blue: #7AA2F7;
    --term-purple: #BB9AF7;
    --term-cyan: #7DCFFF;
    --term-comment: #565F89;
    --term-selection: #283457;
    --term-cursor: #C0CAF5;

    /* Layout */
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --shadow-xl: 0 16px 48px rgba(0,0,0,0.16);

    --keyboard-height: 40%;
    --terminal-height: 60%;
  }

  html, body {
    height: 100%; width: 100%;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--chrome-surface);
    color: var(--chrome-text);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ======================== MAIN LAYOUT ======================== */
  .app-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    background: var(--chrome-bg);
  }

  /* ======================== TOP BAR ======================== */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 44px;
    min-height: 44px;
    background: var(--chrome-bg);
    border-bottom: 1px solid var(--chrome-border);
    z-index: 10;
  }

  .top-bar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-logo {
    font-weight: 700;
    font-size: 15px;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  .app-logo span {
    color: var(--chrome-text);
    font-weight: 500;
  }

  .connection-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--chrome-text-secondary);
    background: var(--chrome-surface);
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 500;
  }

  .connection-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--term-green);
  }

  .top-bar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .top-icon-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--chrome-text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }

  .top-icon-btn:hover {
    background: var(--chrome-surface);
    color: var(--chrome-text);
  }

  .top-icon-btn svg { width: 18px; height: 18px; }

  .recording-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: var(--term-red);
    padding: 3px 10px;
    border-radius: 100px;
    background: #FEF2F2;
  }

  .recording-indicator .rec-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--term-red);
    animation: pulse-rec 1.5s ease-in-out infinite;
  }

  @keyframes pulse-rec {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ======================== TAB BAR ======================== */
  .tab-bar {
    display: flex;
    align-items: stretch;
    height: 40px;
    min-height: 40px;
    background: var(--chrome-bg);
    border-bottom: 1px solid var(--chrome-border);
    padding: 0 12px;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tab-bar::-webkit-scrollbar { display: none; }

  .tab-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 14px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--chrome-text-secondary);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    position: relative;
  }

  .tab-item:hover {
    color: var(--chrome-text);
    background: var(--chrome-surface);
  }

  .tab-item.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  .tab-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tab-dot.green { background: var(--term-green); }
  .tab-dot.blue { background: var(--term-blue); }
  .tab-dot.yellow { background: var(--term-yellow); }

  .tab-label-sub {
    font-size: 10.5px;
    color: var(--chrome-text-secondary);
    font-weight: 400;
    opacity: 0.7;
  }

  .tab-close {
    width: 16px; height: 16px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--chrome-text-secondary);
    opacity: 0;
    transition: all 0.1s;
    margin-left: 2px;
  }

  .tab-item:hover .tab-close { opacity: 0.6; }
  .tab-close:hover { opacity: 1; background: var(--chrome-surface-hover); }

  .tab-add {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    min-width: 32px;
    color: var(--chrome-text-secondary);
    cursor: pointer;
    font-size: 16px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s;
  }

  .tab-add:hover { color: var(--accent); }

  /* ======================== MAIN CONTENT ======================== */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
  }

  /* ======================== TERMINAL ======================== */
  .terminal-wrapper {
    flex: var(--terminal-height);
    min-height: 100px;
    position: relative;
    background: var(--term-bg);
    overflow: hidden;
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
  }

  .terminal-content {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--term-fg);
    scrollbar-width: thin;
    scrollbar-color: var(--term-comment) transparent;
  }

  .terminal-content::-webkit-scrollbar { width: 6px; }
  .terminal-content::-webkit-scrollbar-track { background: transparent; }
  .terminal-content::-webkit-scrollbar-thumb { background: var(--term-comment); border-radius: 3px; }

  .term-line { white-space: pre-wrap; word-break: break-all; }
  .term-prompt { color: var(--term-green); font-weight: 600; }
  .term-command { color: var(--term-fg); font-weight: 500; }
  .term-dir { color: var(--term-blue); }
  .term-file { color: var(--term-fg); }
  .term-exec { color: var(--term-green); }
  .term-link { color: var(--term-cyan); }
  .term-size { color: var(--term-yellow); }
  .term-date { color: var(--term-purple); }
  .term-comment { color: var(--term-comment); }
  .term-error { color: var(--term-red); }
  .term-keyword { color: var(--term-purple); }
  .term-string { color: var(--term-green); }
  .term-function { color: var(--term-blue); }
  .term-type { color: var(--term-cyan); }
  .term-number { color: var(--term-yellow); }
  .term-bold { font-weight: 700; }
  .term-dim { opacity: 0.5; }

  .cursor-block {
    display: inline-block;
    width: 7.2px;
    height: 15px;
    background: var(--term-cursor);
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 1px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Copy/Paste floating toolbar */
  .clipboard-toolbar {
    position: absolute;
    top: 10px;
    right: 14px;
    display: flex;
    gap: 2px;
    background: var(--chrome-bg);
    border-radius: 100px;
    padding: 3px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--chrome-border);
    z-index: 5;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .terminal-wrapper:hover .clipboard-toolbar { opacity: 1; }

  .clip-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    border: none;
    background: transparent;
    color: var(--chrome-text-secondary);
    font-size: 11px;
    font-weight: 500;
    font-family: inherit;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .clip-btn:hover {
    background: var(--chrome-surface);
    color: var(--chrome-text);
  }

  .clip-btn svg { width: 13px; height: 13px; }

  /* ======================== SPLIT DIVIDER ======================== */
  .split-divider {
    height: 8px;
    min-height: 8px;
    background: var(--chrome-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: row-resize;
    z-index: 5;
    border-top: 1px solid var(--chrome-border);
    border-bottom: 1px solid var(--chrome-border);
    transition: background 0.15s;
  }

  .split-divider:hover, .split-divider.dragging {
    background: var(--accent-light);
  }

  .split-divider-handle {
    width: 36px;
    height: 3px;
    border-radius: 2px;
    background: var(--chrome-border);
    transition: background 0.15s;
  }

  .split-divider:hover .split-divider-handle,
  .split-divider.dragging .split-divider-handle {
    background: var(--accent);
  }

  /* ======================== KEYBOARD PANEL ======================== */
  .keyboard-panel {
    flex: var(--keyboard-height);
    min-height: 120px;
    background: var(--chrome-surface);
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 8px 6px 10px;
    overflow: hidden;
  }

  .key-row {
    display: flex;
    gap: 4px;
    justify-content: center;
    flex-shrink: 0;
  }

  .key {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 32px;
    height: 34px;
    padding: 0 8px;
    background: var(--chrome-bg);
    border: 1px solid var(--chrome-border);
    border-radius: var(--radius-xs);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--chrome-text);
    cursor: pointer;
    transition: all 0.1s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    flex-shrink: 0;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
  }

  .key:active, .key.pressed {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
    transform: scale(0.95);
    box-shadow: 0 0 0 2px var(--accent-light);
  }

  .key:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .key.modifier {
    background: var(--chrome-surface);
    font-size: 10.5px;
    font-weight: 600;
    color: var(--chrome-text-secondary);
    letter-spacing: 0.2px;
  }

  .key.modifier.active {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }

  .key.modifier:hover {
    background: var(--chrome-surface-hover);
  }

  .key.wide { min-width: 48px; }
  .key.wider { min-width: 64px; }
  .key.widest { flex: 1; min-width: 80px; }
  .key.space-key { flex: 3; min-width: 120px; }

  .key.fn-key {
    font-size: 10px;
    min-width: 36px;
    height: 28px;
    color: var(--chrome-text-secondary);
  }

  .key.arrow-key {
    min-width: 36px;
    font-size: 14px;
    color: var(--chrome-text-secondary);
  }

  .key.arrow-key svg { width: 14px; height: 14px; }

  .key.enter-key {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
    font-weight: 600;
    min-width: 56px;
  }

  .key.enter-key:hover {
    background: var(--accent-hover);
    color: var(--accent-text);
  }

  /* ======================== BOTTOM TOOLBAR ======================== */
  .bottom-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 36px;
    min-height: 36px;
    padding: 0 12px;
    background: var(--chrome-bg);
    border-top: 1px solid var(--chrome-border);
  }

  .toolbar-left, .toolbar-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .toolbar-chip {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--chrome-text-secondary);
    background: var(--chrome-surface);
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .toolbar-chip:hover {
    background: var(--chrome-surface-hover);
    color: var(--chrome-text);
  }

  .toolbar-chip svg { width: 13px; height: 13px; }

  .toolbar-chip.active {
    background: var(--accent-light);
    color: var(--accent);
  }

  /* ======================== FAB ======================== */
  .fab-claude {
    position: absolute;
    bottom: 56px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 100px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    z-index: 20;
    transition: all 0.2s;
    letter-spacing: -0.1px;
  }

  .fab-claude:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: var(--shadow-xl);
  }

  .fab-claude svg { width: 16px; height: 16px; }

  /* ======================== ORIENTATION TOGGLE ======================== */
  .app-container.portrait {
    /* Reconfigure for portrait */
  }

  .app-container.portrait .keyboard-panel {
    flex: 50%;
  }

  .app-container.portrait .terminal-wrapper {
    flex: 50%;
  }

  /* ======================== SELECTION HIGHLIGHT ======================== */
  .term-selection-highlight {
    background: var(--term-selection);
    border-radius: 2px;
  }

  /* Smooth animations */
  .terminal-wrapper, .keyboard-panel {
    transition: flex 0.2s ease;
  }

  /* Mobile adjustments */
  @media (max-width: 600px) {
    .key { min-width: 26px; height: 30px; font-size: 10.5px; }
    .key.fn-key { min-width: 28px; height: 24px; font-size: 9px; }
    .terminal-content { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="app-container" id="appContainer">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="app-logo">Ori<span>:Dev</span></div>
      <div class="connection-badge">
        <div class="dot"></div>
        <span>ssh root@192.168.1.42</span>
      </div>
    </div>
    <div class="top-bar-right">
      <div class="recording-indicator">
        <div class="rec-dot"></div>
        REC
      </div>
      <button class="top-icon-btn" id="orientationToggle" title="Toggle orientation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="2" width="16" height="20" rx="2"/>
          <line x1="12" y1="18" x2="12" y2="18"/>
        </svg>
      </button>
      <button class="top-icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <button class="top-icon-btn" title="More">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar" id="tabBar">
    <div class="tab-item active" data-tab="server01">
      <div class="tab-dot green"></div>
      <span>server01</span>
      <div class="tab-close">&times;</div>
    </div>
    <div class="tab-item" data-tab="server02">
      <div class="tab-dot blue"></div>
      <span>server02</span>
      <span class="tab-label-sub">(Claude Code)</span>
      <div class="tab-close">&times;</div>
    </div>
    <div class="tab-item" data-tab="server03">
      <div class="tab-dot yellow"></div>
      <span>server03</span>
      <span class="tab-label-sub">(Logs)</span>
      <div class="tab-close">&times;</div>
    </div>
    <div class="tab-add" title="New tab">+</div>
  </div>

  <!-- MAIN CONTENT AREA -->
  <div class="main-content">

    <!-- TERMINAL -->
    <div class="terminal-wrapper" id="terminalWrapper">
      <!-- Clipboard toolbar -->
      <div class="clipboard-toolbar">
        <button class="clip-btn" id="btnCopy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
        <button class="clip-btn" id="btnPaste">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
          Paste
        </button>
        <button class="clip-btn" id="btnSelect">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 10H3M21 6H3M21 14H3M17 18H3"/></svg>
          Select
        </button>
      </div>

      <div class="terminal-content" id="terminalContent"></div>
    </div>

    <!-- SPLIT DIVIDER -->
    <div class="split-divider" id="splitDivider">
      <div class="split-divider-handle"></div>
    </div>

    <!-- KEYBOARD PANEL -->
    <div class="keyboard-panel" id="keyboardPanel">
      <!-- F-keys row -->
      <div class="key-row">
        <button class="key fn-key" data-key="Escape">Esc</button>
        <button class="key fn-key" data-key="F1">F1</button>
        <button class="key fn-key" data-key="F2">F2</button>
        <button class="key fn-key" data-key="F3">F3</button>
        <button class="key fn-key" data-key="F4">F4</button>
        <button class="key fn-key" data-key="F5">F5</button>
        <button class="key fn-key" data-key="F6">F6</button>
        <button class="key fn-key" data-key="F7">F7</button>
        <button class="key fn-key" data-key="F8">F8</button>
        <button class="key fn-key" data-key="F9">F9</button>
        <button class="key fn-key" data-key="F10">F10</button>
        <button class="key fn-key" data-key="F11">F11</button>
        <button class="key fn-key" data-key="F12">F12</button>
      </div>
      <!-- Modifier row -->
      <div class="key-row">
        <button class="key modifier wide" data-key="Tab">Tab</button>
        <button class="key modifier wide" id="ctrlKey" data-key="Ctrl">Ctrl</button>
        <button class="key modifier wide" id="altKey" data-key="Alt">Alt</button>
        <button class="key" data-key="~">~</button>
        <button class="key" data-key="`">`</button>
        <button class="key" data-key="|">|</button>
        <button class="key" data-key="\">\</button>
        <button class="key" data-key="/">/</button>
        <button class="key" data-key="-">-</button>
        <button class="key" data-key="_">_</button>
        <button class="key" data-key="=">=</button>
        <button class="key" data-key="[">[</button>
        <button class="key" data-key="]">]</button>
        <button class="key" data-key="{">{</button>
        <button class="key" data-key="}">}</button>
      </div>
      <!-- Number row -->
      <div class="key-row">
        <button class="key" data-key="1">1</button>
        <button class="key" data-key="2">2</button>
        <button class="key" data-key="3">3</button>
        <button class="key" data-key="4">4</button>
        <button class="key" data-key="5">5</button>
        <button class="key" data-key="6">6</button>
        <button class="key" data-key="7">7</button>
        <button class="key" data-key="8">8</button>
        <button class="key" data-key="9">9</button>

// ============================ RENDERING ============================
const terminalEl = document.getElementById('terminalContent');

function getPrompt() {
  const tab = state.activeTab;
  const hosts = { server01: 'server01', server02: 'server02', server03: 'server03' };
  const dirs = { server01: '~/project', server02: '~/app', server03: '~' };
  return `<span class="term-prompt">root@${hosts[tab]}</span>:<span class="term-dir">${dirs[tab]}</span>$ `;
}

function renderTerminal() {
  const tab = state.activeTab;
  const data = tabContents[tab];
  let html = '';

  for (const line of data.lines) {
    html += `<div class="term-line">${line.html}</div>`;
  }

  // Current input line
  html += `<div class="term-line">${getPrompt()}<span class="term-command">${escapeHtml(state.commandBuffer)}</span><span class="cursor-block"></span></div>`;

  terminalEl.innerHTML = html;
  terminalEl.scrollTop = terminalEl.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ============================ COMMAND EXECUTION ============================
function executeCommand(cmd) {
  const tab = state.activeTab;
  const data = tabContents[tab];
  const trimmed = cmd.trim();

  // Add command line
  data.lines.push({ html: `${getPrompt()}<span class="term-command">${escapeHtml(cmd)}</span>` });

  if (trimmed === 'clear') {
    data.lines = [];
  } else if (commandResponses[trimmed]) {
    for (const line of commandResponses[trimmed]) {
      data.lines.push(line);
    }
    data.lines.push({ html: '' });
  } else if (trimmed !== '') {
    // Generic response
    data.lines.push({ html: `<span class="term-dim">$ ${escapeHtml(trimmed)}: simulated output</span>` });
    data.lines.push({ html: '' });
  }

  // Save to history
  if (trimmed) {
    state.history.unshift(trimmed);
    state.historyIndex = -1;
  }

  state.commandBuffer = '';
  renderTerminal();
}

// ============================ KEY HANDLING ============================
function handleKey(key) {
  // Animate key
  const keyEl = document.querySelector(`.key[data-key="${CSS.escape(key)}"]`);
  if (keyEl) {
    keyEl.classList.add('pressed');
    setTimeout(() => keyEl.classList.remove('pressed'), 120);
  }

  if (key === 'Enter') {
    executeCommand(state.commandBuffer);
    return;
  }

  if (key === 'Backspace') {
    state.commandBuffer = state.commandBuffer.slice(0, -1);
    renderTerminal();
    return;
  }

  if (key === 'Tab') {
    state.commandBuffer += '    ';
    renderTerminal();
    return;
  }

  if (key === 'Escape') {
    state.commandBuffer = '';
    renderTerminal();
    return;
  }

  if (key === 'ArrowUp') {
    if (state.historyIndex < state.history.length - 1) {
      state.historyIndex++;
      state.commandBuffer = state.history[state.historyIndex];
      renderTerminal();
    }
    return;
  }

  if (key === 'ArrowDown') {
    if (state.historyIndex > 0) {
      state.historyIndex--;
      state.commandBuffer = state.history[state.historyIndex];
    } else {
      state.historyIndex = -1;
      state.commandBuffer = '';
    }
    renderTerminal();
    return;
  }

  if (key === 'ArrowLeft' || key === 'ArrowRight') return;
  if (key.startsWith('F') && key.length <= 3) return;
  if (key === 'Ctrl' || key === 'Alt') return;

  // Handle Ctrl+C
  if (state.ctrlActive && key === 'c') {
    tabContents[state.activeTab].lines.push({
      html: `${getPrompt()}<span class="term-command">${escapeHtml(state.commandBuffer)}</span>^C`
    });
    state.commandBuffer = '';
    state.ctrlActive = false;
    document.getElementById('ctrlKey').classList.remove('active');
    renderTerminal();
    return;
  }

  // Handle Ctrl+L
  if (state.ctrlActive && key === 'l') {
    tabContents[state.activeTab].lines = [];
    state.commandBuffer = '';
    state.ctrlActive = false;
    document.getElementById('ctrlKey').classList.remove('active');
    renderTerminal();
    return;
  }

  state.commandBuffer += key;

  // Reset modifiers after use
  if (state.ctrlActive) {
    state.ctrlActive = false;
    document.getElementById('ctrlKey').classList.remove('active');
  }
  if (state.altActive) {
    state.altActive = false;
    document.getElementById('altKey').classList.remove('active');
  }

  renderTerminal();
}

// ============================ KEYBOARD EVENTS ============================
document.querySelectorAll('.key').forEach(el => {
  const key = el.getAttribute('data-key');

  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();

    if (key === 'Ctrl') {
      state.ctrlActive = !state.ctrlActive;
      el.classList.toggle('active', state.ctrlActive);
      return;
    }
    if (key === 'Alt') {
      state.altActive = !state.altActive;
      el.classList.toggle('active', state.altActive);
      return;
    }

    handleKey(key);
  });
});

// Physical keyboard support
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'c') {
    e.preventDefault();
    state.ctrlActive = true;
    handleKey('c');
    return;
  }
  if (e.ctrlKey && e.key === 'l') {
    e.preventDefault();
    state.ctrlActive = true;
    handleKey('l');
    return;
  }

  if (e.key === 'Enter') { e.preventDefault(); handleKey('Enter'); return; }
  if (e.key === 'Backspace') { e.preventDefault(); handleKey('Backspace'); return; }
  if (e.key === 'Tab') { e.preventDefault(); handleKey('Tab'); return; }
  if (e.key === 'Escape') { e.preventDefault(); handleKey('Escape'); return; }
  if (e.key === 'ArrowUp') { e.preventDefault(); handleKey('ArrowUp'); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); handleKey('ArrowDown'); return; }

  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    handleKey(e.key);
  }
});

// ============================ TAB SWITCHING ============================
document.getElementById('tabBar').addEventListener('click', (e) => {
  const tabItem = e.target.closest('.tab-item');
  if (!tabItem) return;

  const tabId = tabItem.getAttribute('data-tab');
  if (!tabId) return;

  // Update active
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  tabItem.classList.add('active');

  state.activeTab = tabId;
  state.commandBuffer = '';
  renderTerminal();

  // Update connection badge
  const hosts = { server01: 'root@192.168.1.42', server02: 'root@192.168.1.43', server03: 'root@10.0.0.15' };
  document.querySelector('.connection-badge span').textContent = `ssh ${hosts[tabId]}`;
});

// ============================ SPLIT DIVIDER DRAGGING ============================
const divider = document.getElementById('splitDivider');
const mainContent = document.querySelector('.main-content');

let startY = 0;
let startTerminalFlex = 60;
let startKeyboardFlex = 40;

divider.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  state.isDragging = true;
  divider.classList.add('dragging');
  divider.setPointerCapture(e.pointerId);
  startY = e.clientY;

  const termWrapper = document.getElementById('terminalWrapper');
  const keyPanel = document.getElementById('keyboardPanel');
  const totalH = mainContent.clientHeight - divider.offsetHeight;
  startTerminalFlex = (termWrapper.offsetHeight / totalH) * 100;
  startKeyboardFlex = (keyPanel.offsetHeight / totalH) * 100;

  // Disable transition during drag
  termWrapper.style.transition = 'none';
  keyPanel.style.transition = 'none';
});

divider.addEventListener('pointermove', (e) => {
  if (!state.isDragging) return;
  const totalH = mainContent.clientHeight - divider.offsetHeight;
  const dy = e.clientY - startY;
  const dp = (dy / totalH) * 100;

  let newTerminal = Math.max(20, Math.min(80, startTerminalFlex + dp));
  let newKeyboard = 100 - newTerminal;

  document.getElementById('terminalWrapper').style.flex = `${newTerminal}`;
  document.getElementById('keyboardPanel').style.flex = `${newKeyboard}`;
});

divider.addEventListener('pointerup', () => {
  state.isDragging = false;
  divider.classList.remove('dragging');
  document.getElementById('terminalWrapper').style.transition = '';
  document.getElementById('keyboardPanel').style.transition = '';
});

// ============================ ORIENTATION TOGGLE ============================
document.getElementById('orientationToggle').addEventListener('click', () => {
  state.isPortrait = !state.isPortrait;
  document.getElementById('appContainer').classList.toggle('portrait', state.isPortrait);

  if (state.isPortrait) {
    document.getElementById('terminalWrapper').style.flex = '50';
    document.getElementById('keyboardPanel').style.flex = '50';
    document.getElementById('termSize').textContent = '80x24';
  } else {
    document.getElementById('terminalWrapper').style.flex = '60';
    document.getElementById('keyboardPanel').style.flex = '40';
    document.getElementById('termSize').textContent = '120x36';
  }
});

// ============================ KEYBOARD TOGGLE ============================
document.getElementById('toggleKeyboard').addEventListener('click', () => {
  state.keyboardVisible = !state.keyboardVisible;
  const panel = document.getElementById('keyboardPanel');
  const chip = document.getElementById('toggleKeyboard');

  if (state.keyboardVisible) {
    panel.style.display = '';
    divider.style.display = '';
    chip.classList.add('active');
  } else {
    panel.style.display = 'none';
    divider.style.display = 'none';
    chip.classList.remove('active');
  }
});

// ============================ FAB ============================
document.getElementById('fabClaude').addEventListener('click', () => {
  const cmd = state.commandBuffer.trim();
  if (!cmd) {
    state.commandBuffer = 'claude -p "';
    renderTerminal();
    return;
  }
  // Wrap in claude command
  state.commandBuffer = `claude -p "${cmd}"`;
  renderTerminal();
});

// ============================ CLIPBOARD ============================
document.getElementById('btnCopy').addEventListener('click', () => {
  const text = terminalEl.innerText;
  navigator.clipboard?.writeText(text).catch(() => {});
  const btn = document.getElementById('btnCopy');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied';
  setTimeout(() => {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy';
  }, 1500);
});

document.getElementById('btnPaste').addEventListener('click', () => {
  navigator.clipboard?.readText().then(text => {
    state.commandBuffer += text;
    renderTerminal();
  }).catch(() => {});
});

// ============================ INIT ============================
renderTerminal();
</script>
