build:
  maxIssues: 0

complexity:
  CyclomaticComplexMethod:
    threshold: 50
  LongMethod:
    threshold: 250
  LongParameterList:
    functionThreshold: 18
    constructorThreshold: 15
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 30
    thresholdInInterfaces: 15

exceptions:
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - ArrayIndexOutOfBoundsException
      - Error
      - IllegalMonitorStateException
      - NullPointerException
      - IndexOutOfBoundsException
      - RuntimeException
      - Throwable

formatting:
  MaximumLineLength:
    maxLineLength: 120
  NoWildcardImports:
    active: true
  TrailingCommaOnCallSite:
    active: true
  TrailingCommaOnDeclarationSite:
    active: true

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9_]*'

style:
  ForbiddenComment:
    active: false
  LoopWithTooManyJumpStatements:
    active: false
  MagicNumber:
    active: false
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreEnums: true
    ignoreNamedArgument: true
    ignoreRanges: true
    ignoreExtensionFunctions: true
  MaxLineLength:
    active: false
  ReturnCount:
    max: 5
  UnusedPrivateMember:
    active: true
    allowedNames: '(_|.*Preview.*)'
  UseCheckOrError:
    active: false
  WildcardImport:
    active: true
