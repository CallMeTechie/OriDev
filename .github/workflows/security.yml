name: Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  dependency-scan:
    name: Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate dependency report
        run: ./gradlew dependencies --configuration releaseRuntimeClasspath > /tmp/deps.txt 2>&1 || true

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: /tmp/deps.txt

  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Check dependency licenses
        run: |
          ./gradlew :app:dependencies --configuration releaseRuntimeClasspath 2>/dev/null | \
            grep -E '^\+---|\\---' | \
            sed 's/[+\\|]---//g' | \
            sed 's/^ *//' | \
            sort -u > /tmp/all-deps.txt
          echo "Dependency count:"
          wc -l < /tmp/all-deps.txt
          cat /tmp/all-deps.txt
