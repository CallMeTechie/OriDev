name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ============================================================
  # Verify before release
  # ============================================================
  verify:
    name: Pre-Release Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Run all tests
        run: ./gradlew test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-failures
          path: '**/build/reports/tests/'

  # ============================================================
  # Build signed release artifacts and publish to GitHub + Play Store
  # Fails fast on missing secrets -- no silent skipping.
  # ============================================================
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # ------------------------------------------------------------
      # Signing secret gate -- fails immediately if any are missing.
      # See docs/SECRETS_SETUP.md for configuration instructions.
      # ------------------------------------------------------------
      - name: Check signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$KEYSTORE_BASE64" ]   && missing+=("KEYSTORE_BASE64")
          [ -z "$KEYSTORE_PASSWORD" ] && missing+=("KEYSTORE_PASSWORD")
          [ -z "$KEY_ALIAS" ]         && missing+=("KEY_ALIAS")
          [ -z "$KEY_PASSWORD" ]      && missing+=("KEY_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required signing secrets: ${missing[*]}. See docs/SECRETS_SETUP.md section 1 for setup instructions."
            exit 1
          fi
          echo "All signing secrets present."

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      # ------------------------------------------------------------
      # Build signed AAB + APK for phone and wear.
      # Versions come from /version.properties (single source of truth).
      # ------------------------------------------------------------
      - name: Build signed AAB and APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:bundleRelease :app:assembleRelease \
                    :wear:bundleRelease :wear:assembleRelease

      - name: Verify APK/AAB signing
        run: |
          set -e
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          if [ -z "$AAB" ]; then
            echo "::error::No AAB produced"
            exit 1
          fi
          BUILD_TOOLS=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -type d | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced"
            exit 1
          fi
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK"
          "$BUILD_TOOLS/apksigner" verify --min-sdk-version=34 "$APK"
          # v2/v3 required (minSdk 34, no v1 Janus)
          "$BUILD_TOOLS/apksigner" verify -v "$APK" | grep -E 'Verified using v(2|3) scheme.*true' \
            || { echo "::error::APK is not signed with v2 or v3 scheme"; exit 1; }

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          {
            echo "changelog<<CHANGELOG_EOF"
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              echo ""
              echo "### Features"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep "^- feat" || echo "_None_"
              echo ""
              echo "### Bug Fixes"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep "^- fix" || echo "_None_"
              echo ""
              echo "### Other"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep -v "^- feat" | grep -v "^- fix" || echo "_None_"
            else
              echo "Initial release"
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stage release artifacts
        id: stage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUT=release-artifacts
          mkdir -p "$OUT"

          cp app/build/outputs/bundle/release/*.aab            "$OUT/oridev-${VERSION}.aab"            2>/dev/null || true
          cp app/build/outputs/apk/release/*.apk               "$OUT/oridev-${VERSION}.apk"            2>/dev/null || true
          cp app/build/outputs/mapping/release/mapping.txt     "$OUT/oridev-${VERSION}-mapping.txt"    2>/dev/null || true
          cp app/build/outputs/mapping/release/seeds.txt       "$OUT/oridev-${VERSION}-seeds.txt"      2>/dev/null || true
          cp app/build/outputs/mapping/release/usage.txt       "$OUT/oridev-${VERSION}-usage.txt"      2>/dev/null || true

          cp wear/build/outputs/bundle/release/*.aab           "$OUT/oridev-wear-${VERSION}.aab"         2>/dev/null || true
          cp wear/build/outputs/apk/release/*.apk              "$OUT/oridev-wear-${VERSION}.apk"         2>/dev/null || true
          cp wear/build/outputs/mapping/release/mapping.txt    "$OUT/oridev-wear-${VERSION}-mapping.txt" 2>/dev/null || true

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dir=$OUT" >> "$GITHUB_OUTPUT"

          echo "## Release Artifacts ($VERSION)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for file in "$OUT"/*; do
            [ -f "$file" ] || continue
            size=$(du -h "$file" | cut -f1)
            name=$(basename "$file")
            echo "- **$name**: $size" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: ${{ steps.stage.outputs.dir }}/*
          fail_on_unmatched_files: false

      # ------------------------------------------------------------
      # Play Store upload -- fails immediately if secret is missing.
      # See docs/SECRETS_SETUP.md section 2 for service account setup.
      # ------------------------------------------------------------
      - name: Decode Play service account
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON secret not set. See docs/SECRETS_SETUP.md section 2 for how to obtain it."
            exit 1
          fi
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > /tmp/play-sa.json
          echo "PLAY_SERVICE_ACCOUNT_JSON_PATH=/tmp/play-sa.json" >> "$GITHUB_ENV"

      - name: Upload to Play Store (internal track)
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON_PATH: /tmp/play-sa.json
        run: ./gradlew :app:publishReleaseBundle

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f "${{ github.workspace }}/app/release.keystore"
          rm -f /tmp/play-sa.json 2>/dev/null || true
          rm -f keystore.base64 2>/dev/null || true
          echo "Secret cleanup done"
