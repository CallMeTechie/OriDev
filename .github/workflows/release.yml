name: Release

on:
  push:
    tags: ['v*']
  workflow_run:
    workflows: ["Build & Test"]
    types: [completed]
    branches: [master]

permissions:
  contents: write

jobs:
  # ============================================================
  # Verify before release
  # ============================================================
  verify:
    name: Pre-Release Verification
    runs-on: ubuntu-latest
    # Tag pushes always run; workflow_run only proceeds on a successful upstream run.
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Full test suite must pass before release
      - name: Run detekt
        run: ./gradlew detekt

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Run all tests
        run: ./gradlew test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-failures
          path: '**/build/reports/tests/'

  # ============================================================
  # Build signed release artifacts (handles both tag and continuous modes)
  # ============================================================
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [verify]
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # ----------------------------------------------------------
      # Signing-secret presence gate.
      # Tag mode FAILS if secrets are missing (proper releases must be signed).
      # Continuous mode SKIPS gracefully (logs warning, exits 0).
      # ----------------------------------------------------------
      - name: Check signing secrets available
        id: secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && \
             [ -n "$KEYSTORE_PASSWORD" ] && \
             [ -n "$KEY_ALIAS" ] && \
             [ -n "$KEY_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "::error::Tag release requires signing secrets (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD). See RELEASE.md."
              exit 1
            else
              echo "::warning::Skipping continuous release: signing secrets not configured. See RELEASE.md."
            fi
          fi

      - name: Decode Keystore
        if: steps.secrets.outputs.available == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      # ----------------------------------------------------------
      # TAG MODE: build with versions from app/build.gradle.kts as-is
      # ----------------------------------------------------------
      - name: Build signed AAB and APK (tag mode)
        if: github.event_name == 'push' && steps.secrets.outputs.available == 'true'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:bundleRelease :app:assembleRelease \
                    :wear:bundleRelease :wear:assembleRelease

      # ----------------------------------------------------------
      # CONTINUOUS MODE: inject versionCode = run_number, versionName = 0.2.0-master.<n>+<sha>
      # ----------------------------------------------------------
      - name: Build signed AAB and APK (continuous mode)
        if: github.event_name == 'workflow_run' && steps.secrets.outputs.available == 'true'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          ./gradlew :app:bundleRelease :app:assembleRelease \
                    :wear:bundleRelease :wear:assembleRelease \
                    -PversionCode=${{ github.run_number }} \
                    -PversionName="0.2.0-master.${{ github.run_number }}+${SHORT_SHA}"

      - name: Verify AAB signing
        if: steps.secrets.outputs.available == 'true'
        run: |
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          if [ -z "$AAB" ]; then
            echo "::error::No AAB produced"
            exit 1
          fi
          BUILD_TOOLS=$(find $ANDROID_HOME/build-tools -maxdepth 1 -type d | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          $BUILD_TOOLS/apksigner verify --verbose "$AAB" || echo "Note: apksigner verify may warn on AABs"
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -n "$APK" ]; then
            $BUILD_TOOLS/apksigner verify --verbose --print-certs "$APK"
            $BUILD_TOOLS/apksigner verify --min-sdk-version=34 "$APK"
          fi

      # Generate changelog from commits since last tag (tag mode only)
      - name: Generate Changelog
        id: changelog
        if: github.event_name == 'push' && steps.secrets.outputs.available == 'true'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "changelog<<CHANGELOG_EOF"
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              echo ""
              echo "### Features"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep "^- feat" || echo "_None_"
              echo ""
              echo "### Bug Fixes"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep "^- fix" || echo "_None_"
              echo ""
              echo "### Other"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep -v "^- feat" | grep -v "^- fix" || echo "_None_"
            else
              echo "Initial release"
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # Report artifact sizes
      - name: Artifact size report
        if: steps.secrets.outputs.available == 'true'
        run: |
          echo "## Release Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for file in $(find . -name "*.apk" -o -name "*.aab" | grep -i release); do
            size=$(du -h "$file" | cut -f1)
            name=$(basename "$file")
            echo "- **$name**: $size" >> $GITHUB_STEP_SUMMARY
          done

      # ----------------------------------------------------------
      # TAG MODE: standard GitHub Release
      # ----------------------------------------------------------
      - name: Create GitHub Release (tag mode)
        if: github.event_name == 'push' && steps.secrets.outputs.available == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
            wear/build/outputs/bundle/release/*.aab
            wear/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false

      # ----------------------------------------------------------
      # CONTINUOUS MODE: rolling continuous-master prerelease
      # ----------------------------------------------------------
      - name: Delete existing continuous-master release and tag
        if: github.event_name == 'workflow_run' && steps.secrets.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete continuous-master --yes --cleanup-tag --repo "${{ github.repository }}" || true

      - name: Create rolling continuous-master prerelease
        if: github.event_name == 'workflow_run' && steps.secrets.outputs.available == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-master
          name: "Latest Master Build (${{ github.run_number }})"
          prerelease: true
          target_commitish: ${{ github.sha }}
          body: |
            Automatic build from master branch. Force-moved on every successful push.

            **Commit:** ${{ github.sha }}
            **Build number:** ${{ github.run_number }}
            **Triggered by:** ${{ github.event.workflow_run.head_commit.message }}

            Always download via `gh release download continuous-master` to get the latest master build.
            For production releases, use a `v*` tag.
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
            wear/build/outputs/bundle/release/*.aab
            wear/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false

      # ----------------------------------------------------------
      # OPTIONAL: Google Play upload (gated on PLAY_SERVICE_ACCOUNT_JSON secret)
      # Currently documented-only (see RELEASE.md). To enable, uncomment below
      # and add the play-publisher Gradle plugin to app/build.gradle.kts.
      # ----------------------------------------------------------
      - name: Check Play Store secret
        id: play
        if: steps.secrets.outputs.available == 'true'
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PLAY_SERVICE_ACCOUNT_JSON not set; skipping Play Store upload."
          fi

      - name: Decode Play service account
        if: steps.play.outputs.available == 'true'
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > /tmp/play-sa.json
          echo "PLAY_SERVICE_ACCOUNT_JSON_PATH=/tmp/play-sa.json" >> "$GITHUB_ENV"

      - name: Upload to Play Store (internal track)
        if: steps.play.outputs.available == 'true'
        env:
          PLAY_SERVICE_ACCOUNT_JSON_PATH: /tmp/play-sa.json
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Requires play-publisher plugin in app/build.gradle.kts. See RELEASE.md
          # for the manual one-line addition. If the task is missing, this step
          # logs a warning and continues so the release isn't blocked.
          if ./gradlew tasks --all | grep -q "publishReleaseBundle"; then
            ./gradlew :app:publishReleaseBundle
          else
            echo "::warning::play-publisher plugin not configured; see RELEASE.md to enable Play Store upload."
          fi

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f "${{ github.workspace }}/app/release.keystore"
          rm -f /tmp/play-sa.json 2>/dev/null || true
          rm -f keystore.base64 2>/dev/null || true
          echo "Secret cleanup done"
