name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ============================================================
  # Verify before release
  # ============================================================
  verify:
    name: Pre-Release Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Full test suite must pass before release
      - name: Run detekt
        run: ./gradlew detekt

      - name: Run all tests
        run: ./gradlew test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-failures
          path: '**/build/reports/tests/'

  # ============================================================
  # Build signed release artifacts
  # ============================================================
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      # Build signed APK + AAB for phone
      - name: Build phone release
        run: ./gradlew bundleRelease assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Build wear release
      - name: Build wear release
        run: ./gradlew :wear:assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Generate changelog from commits since last tag
      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "changelog<<CHANGELOG_EOF"
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              echo ""
              # Group by conventional commit type
              echo "### Features"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep "^- feat" || echo "_None_"
              echo ""
              echo "### Bug Fixes"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep "^- fix" || echo "_None_"
              echo ""
              echo "### Other"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep -v "^- feat" | grep -v "^- fix" || echo "_None_"
            else
              echo "Initial release"
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # Report artifact sizes
      - name: Artifact size report
        run: |
          echo "## Release Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for file in $(find . -name "*.apk" -o -name "*.aab" | grep -i release); do
            size=$(du -h "$file" | cut -f1)
            name=$(basename "$file")
            echo "- **$name**: $size" >> $GITHUB_STEP_SUMMARY
          done

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
            wear/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false
