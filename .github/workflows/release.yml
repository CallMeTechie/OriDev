name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ============================================================
  # Verify before release
  # ============================================================
  verify:
    name: Pre-Release Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Run all tests
        run: ./gradlew test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-failures
          path: '**/build/reports/tests/'

  # ============================================================
  # Build signed release artifacts and publish to GitHub + Play Store
  # Fails fast on missing secrets -- no silent skipping.
  # ============================================================
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # ------------------------------------------------------------
      # Signing mode detection. NEVER fails here -- falls back to debug
      # signing if KEYSTORE_* secrets are missing so the GitHub Release is
      # always produced. See docs/SECRETS_SETUP.md to enable release signing
      # (required for Play Store uploads).
      # ------------------------------------------------------------
      - name: Detect signing mode
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && \
             [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "mode=release" >> "$GITHUB_OUTPUT"
            echo "All signing secrets present — building with release keystore."
          else
            echo "mode=debug" >> "$GITHUB_OUTPUT"
            echo "::warning::KEYSTORE_* secrets not configured — falling back to debug signing. Artifacts will be published to GitHub Release but are NOT Play Store installable. See docs/SECRETS_SETUP.md to enable release signing."
          fi

      - name: Decode Keystore
        if: steps.signing.outputs.mode == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      # ------------------------------------------------------------
      # Build AAB + APK for phone and wear. Always runs.
      # Gradle's signingConfig picks the release keystore when
      # KEYSTORE_PASSWORD is set, otherwise the debug keystore.
      # Versions come from /version.properties (single source of truth).
      # ------------------------------------------------------------
      - name: Build AAB and APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:bundleRelease :app:assembleRelease \
                    :wear:bundleRelease :wear:assembleRelease

      - name: Verify APK/AAB signing
        run: |
          set -e
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          if [ -z "$AAB" ]; then
            echo "::error::No AAB produced"
            exit 1
          fi
          BUILD_TOOLS=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -type d | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced"
            exit 1
          fi
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$APK" || true
          if [ "${{ steps.signing.outputs.mode }}" = "release" ]; then
            "$BUILD_TOOLS/apksigner" verify --min-sdk-version=34 "$APK"
            "$BUILD_TOOLS/apksigner" verify -v "$APK" | grep -E 'Verified using v(2|3) scheme.*true' \
              || { echo "::error::APK is not signed with v2 or v3 scheme"; exit 1; }
          else
            echo "::notice::Debug-signed build — skipping strict v2/v3 verification."
          fi

      - name: Generate Changelog
        id: changelog
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || echo "")
          {
            echo "changelog<<CHANGELOG_EOF"
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              echo ""
              echo "### Features"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep "^- feat" || echo "_None_"
              echo ""
              echo "### Bug Fixes"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep "^- fix" || echo "_None_"
              echo ""
              echo "### Other"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep -v "^- feat" | grep -v "^- fix" || echo "_None_"
            else
              echo "Initial release"
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stage release artifacts
        id: stage
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          OUT=release-artifacts
          mkdir -p "$OUT"

          cp app/build/outputs/bundle/release/*.aab            "$OUT/oridev-${VERSION}.aab"            2>/dev/null || true
          cp app/build/outputs/apk/release/*.apk               "$OUT/oridev-${VERSION}.apk"            2>/dev/null || true
          cp app/build/outputs/mapping/release/mapping.txt     "$OUT/oridev-${VERSION}-mapping.txt"    2>/dev/null || true
          cp app/build/outputs/mapping/release/seeds.txt       "$OUT/oridev-${VERSION}-seeds.txt"      2>/dev/null || true
          cp app/build/outputs/mapping/release/usage.txt       "$OUT/oridev-${VERSION}-usage.txt"      2>/dev/null || true

          cp wear/build/outputs/bundle/release/*.aab           "$OUT/oridev-wear-${VERSION}.aab"         2>/dev/null || true
          cp wear/build/outputs/apk/release/*.apk              "$OUT/oridev-wear-${VERSION}.apk"         2>/dev/null || true
          cp wear/build/outputs/mapping/release/mapping.txt    "$OUT/oridev-wear-${VERSION}-mapping.txt" 2>/dev/null || true

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dir=$OUT" >> "$GITHUB_OUTPUT"

          echo "## Release Artifacts ($VERSION)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for file in "$OUT"/*; do
            [ -f "$file" ] || continue
            size=$(du -h "$file" | cut -f1)
            name=$(basename "$file")
            echo "- **$name**: $size" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Compose release body
        id: body
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
          SIGNING_MODE: ${{ steps.signing.outputs.mode }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          {
            echo "body<<BODY_EOF"
            echo "**Release ${TAG_NAME}** · Signing: \`${SIGNING_MODE}\`"
            echo ""
            if [ "$SIGNING_MODE" = "debug" ]; then
              echo "> ⚠️ **Debug-signed build** — installable via \`adb install\` but NOT Play-Store uploadable. Configure \`KEYSTORE_*\` secrets ([see SECRETS_SETUP.md](./docs/SECRETS_SETUP.md)) for production signing."
              echo ""
            fi
            echo "### Artifacts"
            echo "- \`oridev-*.aab\` / \`oridev-*.apk\` — Phone build (R8 minified)"
            echo "- \`oridev-wear-*.aab\` / \`oridev-wear-*.apk\` — Wear OS companion"
            echo "- \`oridev-*-mapping.txt\` — R8 deobfuscation map (Play Console upload)"
            echo ""
            echo "$CHANGELOG"
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: "Ori:Dev ${{ github.event.inputs.tag || github.ref_name }}"
          body: ${{ steps.body.outputs.body }}
          prerelease: ${{ steps.signing.outputs.mode == 'debug' }}
          files: ${{ steps.stage.outputs.dir }}/*
          fail_on_unmatched_files: false

      # ------------------------------------------------------------
      # Play Store upload -- runs only when both release signing AND
      # PLAY_SERVICE_ACCOUNT_JSON are configured. Skips with a warning
      # otherwise (Play Store requires a real release keystore).
      # See docs/SECRETS_SETUP.md section 2 for service account setup.
      # ------------------------------------------------------------
      - name: Check Play Store upload prerequisites
        id: play
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ "${{ steps.signing.outputs.mode }}" != "release" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Play Store upload: release keystore not configured (debug-signed build)."
          elif [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Play Store upload: PLAY_SERVICE_ACCOUNT_JSON secret not set. See docs/SECRETS_SETUP.md section 2."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode Play service account
        if: steps.play.outputs.available == 'true'
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$PLAY_SERVICE_ACCOUNT_JSON" > /tmp/play-sa.json
          echo "PLAY_SERVICE_ACCOUNT_JSON_PATH=/tmp/play-sa.json" >> "$GITHUB_ENV"

      - name: Upload to Play Store (internal track)
        if: steps.play.outputs.available == 'true'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON_PATH: /tmp/play-sa.json
        run: ./gradlew :app:publishReleaseBundle

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f "${{ github.workspace }}/app/release.keystore"
          rm -f /tmp/play-sa.json 2>/dev/null || true
          rm -f keystore.base64 2>/dev/null || true
          echo "Secret cleanup done"
