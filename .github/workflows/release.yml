name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ============================================================
  # Verify before release
  # ============================================================
  verify:
    name: Pre-Release Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Full test suite must pass before release
      - name: Run detekt
        run: ./gradlew detekt

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Run all tests
        run: ./gradlew test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-failures
          path: '**/build/reports/tests/'

  # ============================================================
  # Build signed release artifacts
  # ============================================================
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify signing secrets present
        run: |
          missing=()
          [ -z "${{ secrets.KEYSTORE_BASE64 }}" ] && missing+=("KEYSTORE_BASE64")
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && missing+=("KEYSTORE_PASSWORD")
          [ -z "${{ secrets.KEY_ALIAS }}" ] && missing+=("KEY_ALIAS")
          [ -z "${{ secrets.KEY_PASSWORD }}" ] && missing+=("KEY_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing release secrets: ${missing[*]}"
            exit 1
          fi

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      # Build signed AAB + APK for both phone and wear
      - name: Build signed AAB and APK
        run: |
          ./gradlew :app:bundleRelease :app:assembleRelease \
                    :wear:bundleRelease :wear:assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify AAB signing
        run: |
          AAB=$(find app/build/outputs/bundle/release -name '*.aab' | head -1)
          if [ -z "$AAB" ]; then
            echo "::error::No AAB produced"
            exit 1
          fi
          BUILD_TOOLS=$(find $ANDROID_HOME/build-tools -maxdepth 1 -type d | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"
          $BUILD_TOOLS/apksigner verify --verbose "$AAB" || echo "Note: apksigner verify may warn on AABs"
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -n "$APK" ]; then
            $BUILD_TOOLS/apksigner verify --verbose --print-certs "$APK"
            $BUILD_TOOLS/apksigner verify --min-sdk-version=34 "$APK"
          fi

      # Generate changelog from commits since last tag
      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "changelog<<CHANGELOG_EOF"
            if [ -n "$PREV_TAG" ]; then
              echo "## Changes since $PREV_TAG"
              echo ""
              # Group by conventional commit type
              echo "### Features"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep "^- feat" || echo "_None_"
              echo ""
              echo "### Bug Fixes"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep "^- fix" || echo "_None_"
              echo ""
              echo "### Other"
              git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep -v "^- feat" | grep -v "^- fix" || echo "_None_"
            else
              echo "Initial release"
            fi
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # Report artifact sizes
      - name: Artifact size report
        run: |
          echo "## Release Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for file in $(find . -name "*.apk" -o -name "*.aab" | grep -i release); do
            size=$(du -h "$file" | cut -f1)
            name=$(basename "$file")
            echo "- **$name**: $size" >> $GITHUB_STEP_SUMMARY
          done

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
            wear/build/outputs/bundle/release/*.aab
            wear/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false

      - name: Cleanup keystore
        if: always()
        run: |
          rm -f "${{ github.workspace }}/app/release.keystore"
          rm -f keystore.base64 2>/dev/null || true
          echo "Keystore cleanup done"
