name: PR Check

on:
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ============================================================
  # Stage 1: Fast checks (lint, formatting, static analysis)
  # ============================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run detekt
        run: ./gradlew detekt

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: '**/build/reports/detekt/'

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: '**/build/reports/lint-results*.html'

  # ============================================================
  # Stage 2: Unit tests with coverage
  # ============================================================
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      # Run tests with JaCoCo coverage
      - name: Run unit tests
        run: ./gradlew test --continue

      # Generate JaCoCo coverage report (if configured)
      - name: Generate coverage report
        if: always()
        run: ./gradlew jacocoTestReport --continue || true

      # Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/

      # Upload coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/build/reports/jacoco/'

      # Publish test results as PR check
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/**/*.xml'
          check_name: Unit Test Results
          comment_mode: failures

  # ============================================================
  # Stage 3: Security scanning
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dependency vulnerability check
      - name: Dependency vulnerability scan
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: OriDev
          path: .
          format: HTML
          args: >
            --enableExperimental
            --scan "**/*.gradle.kts"
            --scan "**/libs.versions.toml"
        continue-on-error: true

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

      # Check for hardcoded secrets
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

  # ============================================================
  # Stage 4: Build verification
  # ============================================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      # Build debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # Build wear debug APK
      - name: Build wear debug APK
        run: ./gradlew :wear:assembleDebug

      # Report APK size
      - name: Report APK size
        run: |
          echo "## APK Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          for apk in $(find . -name "*.apk" -path "*/debug/*"); do
            size=$(du -h "$apk" | cut -f1)
            module=$(echo "$apk" | sed 's|.*/\(.*\)/build.*|\1|')
            echo "| $module | $size |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            wear/build/outputs/apk/debug/*.apk

  # ============================================================
  # Stage 5: UI tests (expensive, runs last)
  # ============================================================
  ui-tests:
    name: UI Tests (Emulator)
    runs-on: ubuntu-latest
    needs: [build]
    # Opt-in via PR label to save CI minutes; emulator runs are expensive and flaky
    if: github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'run-ui-tests')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run UI tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew connectedCheck
        continue-on-error: true

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: '**/build/reports/androidTests/'
