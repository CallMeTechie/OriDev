name: PR Check

on:
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ============================================================
  # Stage 1: Fast checks (lint, formatting, static analysis)
  # ============================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 is required by .github/ci/check-forbidden-imports.sh
      # which runs `git diff --name-only -z origin/<base>...HEAD` to scope its
      # check to changed files only. Default fetch-depth: 1 makes origin/<base>
      # unavailable and the diff fails with "unknown revision".
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Phase 11 P0.10.2 - diff-scoped grep guard for forbidden imports.
      # Self-test runs first as a positive control: if the script regex has
      # regressed and stops matching the fixture, this step exits 2 and CI
      # fails before scanning the actual PR diff.
      - name: Forbidden-imports self-test (positive control)
        run: bash .github/ci/check-forbidden-imports.sh --self-test

      - name: Forbidden-imports check (PR diff)
        if: github.ref_type != 'tag'
        run: bash .github/ci/check-forbidden-imports.sh

      # Phase 11 P0.7 - mockup-hash drift guard. Warns (not fails) if any
      # Mockups/*.html file has changed since the Phase 11 baseline. The
      # script + fixture were added in PR 3.5; the actual baseline file
      # .github/mockup-hash.txt is added in this PR (4b).
      - name: Mockup-hash drift check
        run: bash .github/ci/check-mockup-hash.sh

      # Phase 11 P0.10.3 + P0.10.4 + P0.10.5 - Gradle isolation + budget
      # verification. These tasks are also wired into each module check task,
      # but we invoke them explicitly here so a green checkmark in the Code
      # Quality job demonstrably proves they ran (rather than relying on
      # implicit aggregation that could silently skip if check is bypassed).
      - name: Verify Compose isolation and font budget
        run: |
          ./gradlew \
            :core:core-fonts:checkCoreFontsLeakage \
            :core:core-fonts:checkFontBudget \
            :wear:checkWearLeakage

      - name: Run detekt
        run: ./gradlew detekt

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-report
          path: '**/build/reports/detekt/'

      - name: Run Android Lint
        run: ./gradlew lint

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: '**/build/reports/lint-results*.html'

  # ============================================================
  # Stage 2: Unit tests with coverage
  # ============================================================
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Run tests with JaCoCo coverage
      - name: Run unit tests
        run: ./gradlew test --continue

      # Generate JaCoCo coverage report (if configured)
      - name: Generate coverage report
        if: always()
        run: ./gradlew jacocoTestReport --continue || true

      # Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/

      # Upload coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: '**/build/reports/jacoco/'

      # Publish test results as PR check
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/**/*.xml'
          check_name: Unit Test Results
          comment_mode: failures

  # ============================================================
  # Stage 3: Security scanning
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Dependency vulnerability check
      - name: Dependency vulnerability scan
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: OriDev
          path: .
          format: HTML
          args: >
            --enableExperimental
            --scan "**/*.gradle.kts"
            --scan "**/libs.versions.toml"
        continue-on-error: true

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: reports/

      # Check for hardcoded secrets
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

  # ============================================================
  # Stage 4: Build verification
  # ============================================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Build debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug

      # Build wear debug APK
      - name: Build wear debug APK
        run: ./gradlew :wear:assembleDebug

      # Report APK size
      - name: Report APK size
        run: |
          echo "## APK Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          for apk in $(find . -name "*.apk" -path "*/debug/*"); do
            size=$(du -h "$apk" | cut -f1)
            module=$(echo "$apk" | sed 's|.*/\(.*\)/build.*|\1|')
            echo "| $module | $size |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            wear/build/outputs/apk/debug/*.apk

  # ============================================================
  # Stage 4b: Release build smoke test (TD3)
  # ------------------------------------------------------------
  # 80+ PRs shipped to master before this job existed without anyone
  # running :app:assembleRelease. R8/ProGuard silently produces a
  # broken artifact if keep rules drift (Hilt @Inject missing from
  # keep rules, Moshi/Retrofit reflection shrunk away, Room type
  # converters stripped, etc.). This job is the CI gate that catches
  # that class of regression on every PR.
  #
  # No release signing secrets are required: app/build.gradle.kts
  # already falls back to the debug keystore when KEYSTORE_PASSWORD
  # is unset, so the produced APK is NOT shippable -- but it fully
  # exercises the R8 shrinker + obfuscator + resource shrinker
  # pipeline, which is what we actually want to gate on.
  #
  # NOTE to repo owner: after this job lands, add "Release Build"
  # to the master branch protection required-checks list. The TD1
  # protection script does not automatically pick up new checks.
  # ============================================================
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # No KEYSTORE_PASSWORD env is set here, so app/build.gradle.kts
      # automatically falls back to signingConfigs.debug (see the
      # `if (!System.getenv("KEYSTORE_PASSWORD").isNullOrBlank())`
      # branch). That keeps this job secret-free and self-contained.
      - name: Assemble release (R8 + ProGuard smoke test)
        run: ./gradlew :app:assembleRelease

      - name: Report release APK size
        if: always()
        run: |
          echo "## Release APK Size" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for apk in $(find app/build/outputs/apk/release -name "*.apk" 2>/dev/null); do
            size=$(du -h "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "- **$name**: $size (debug-signed, NOT shippable)" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload release APK
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-apk-unsigned
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

  # ============================================================
  # Stage 5a: Mockup layout gate (Phase 11 PR 4a, P0.10.6)
  # Runs UNCONDITIONALLY on every PR (not label-gated like ui-tests).
  # The SettingsScreenLayoutTest asserts the topbar-to-content offset
  # invariant; if it fails, the OriTopBar / Scaffold inset / primitive
  # design needs revising before any further screen migration starts.
  # ============================================================
  mockup-layout-tests:
    name: Mockup Layout Gate
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-pixel6-api34-google_apis-v1

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run SettingsScreenLayoutTest on Pixel 6 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # Single-line script: reactivecircus/android-emulator-runner@v2 invokes
          # the script via `sh -c` with newline splitting that breaks multi-line
          # shell constructs (see PR #39 first run failure logs). The retry loop
          # was moved to a fresh re-run via the GitHub UI when an emulator boot
          # flake actually happens.
          # Two separate Gradle invocations chained with &&. A single invocation
          # with both module tasks and a comma-separated class filter caused
          # DirectTestLoader.doCreateRunner to fail with `initializationError`
          # because the runner tried to instantiate dev.ori.feature.editor.*
          # classes from inside the feature-settings test APK (and vice versa).
          # `&&` is a single-line shell construct so it survives the action's
          # newline-splitting `sh -c` invocation (PR #39 lesson).
          script: ./gradlew :feature-settings:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=dev.ori.feature.settings.ui.SettingsScreenLayoutTest && ./gradlew :feature-editor:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=dev.ori.feature.editor.SoraThemingSpike

      - name: Upload mockup-layout-tests results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mockup-layout-test-results
          path: 'feature-settings/build/reports/androidTests/'

  # ============================================================
  # Stage 5: UI tests (expensive, runs last)
  # ============================================================
  ui-tests:
    name: UI Tests (Emulator)
    runs-on: ubuntu-latest
    needs: [build]
    # Opt-in via PR label to save CI minutes; emulator runs are expensive and flaky
    if: github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'run-ui-tests')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run UI tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew connectedCheck
        continue-on-error: true

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-results
          path: '**/build/reports/androidTests/'
