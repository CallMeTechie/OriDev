name: Build & Test

on:
  push:
    branches: [main, master, develop]

permissions:
  contents: read
  checks: write

jobs:
  # ============================================================
  # Full test suite + build on push to main branches
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 lets .github/ci/check-forbidden-imports.sh diff against
      # origin/master when this workflow runs on push (default fetch-depth: 1
      # would make origin/master unavailable).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Phase 11 P0.10.2 - forbidden-imports grep self-test (positive control).
      # On push to master we don't strictly need the diff-scoped check (master
      # is the source of truth), but the self-test catches script regression
      # the same way it does on PRs.
      - name: Forbidden-imports self-test (positive control)
        run: bash .github/ci/check-forbidden-imports.sh --self-test

      # Phase 11 P0.10.3 + P0.10.4 + P0.10.5 - Compose isolation + font budget
      # verification. Wired explicitly here (not via implicit `check`) so the
      # green checkmark proves they ran.
      - name: Verify Compose isolation and font budget
        run: |
          ./gradlew \
            :core:core-fonts:checkCoreFontsLeakage \
            :core:core-fonts:checkFontBudget \
            :wear:checkWearLeakage

      # Static analysis
      - name: Run detekt
        run: ./gradlew detekt

      # Unit tests
      - name: Run unit tests
        run: ./gradlew test

      # Android Lint — gates master so violations fail fast
      - name: Run Android Lint
        run: ./gradlew lint

      # Publish test results
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/**/*.xml'
          check_name: Unit Test Results

      # Upload test reports
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/detekt/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        include:
          - variant: debug
            sign: false
          - variant: release
            sign: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        if: matrix.sign
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/app/release.keystore"
            # Export absolute path so :wear:validateSigningRelease can find the same keystore.
            # Both app/build.gradle.kts and wear/build.gradle.kts read KEYSTORE_PATH first
            # and only fall back to module-relative "release.keystore" when unset.
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/app/release.keystore" >> "$GITHUB_ENV"
          else
            echo "::warning::KEYSTORE_BASE64 secret not set, skipping release signing"
            exit 0
          fi

      - name: Build ${{ matrix.variant }}
        run: |
          VARIANT=$(echo "${{ matrix.variant }}" | sed 's/./\U&/')
          ./gradlew assemble${VARIANT}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Build wear module
      - name: Build wear ${{ matrix.variant }}
        run: |
          VARIANT=$(echo "${{ matrix.variant }}" | sed 's/./\U&/')
          ./gradlew :wear:assemble${VARIANT}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # APK size summary
      - name: APK size report
        run: |
          echo "## Build: ${{ matrix.variant }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for apk in $(find . -name "*.apk" -path "*/${{ matrix.variant }}/*" 2>/dev/null); do
            size=$(du -h "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "- **$name**: $size" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: apk-${{ matrix.variant }}
          path: |
            app/build/outputs/apk/${{ matrix.variant }}/*.apk
            wear/build/outputs/apk/${{ matrix.variant }}/*.apk
          retention-days: 30
