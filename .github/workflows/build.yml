name: Build & Test

on:
  push:
    branches: [main, master, develop]

permissions:
  contents: read
  checks: write

jobs:
  # ============================================================
  # Full test suite + build on push to main branches
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Static analysis
      - name: Run detekt
        run: ./gradlew detekt

      # Unit tests
      - name: Run unit tests
        run: ./gradlew test

      # Android Lint — gates master so violations fail fast
      - name: Run Android Lint
        run: ./gradlew lint

      # Publish test results
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/build/test-results/**/*.xml'
          check_name: Unit Test Results

      # Upload test reports
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/detekt/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        include:
          - variant: debug
            sign: false
          - variant: release
            sign: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        if: matrix.sign
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          else
            echo "::warning::KEYSTORE_BASE64 secret not set, skipping release signing"
            exit 0
          fi

      - name: Build ${{ matrix.variant }}
        run: |
          VARIANT=$(echo "${{ matrix.variant }}" | sed 's/./\U&/')
          ./gradlew assemble${VARIANT}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Build wear module
      - name: Build wear ${{ matrix.variant }}
        run: |
          VARIANT=$(echo "${{ matrix.variant }}" | sed 's/./\U&/')
          ./gradlew :wear:assemble${VARIANT}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # APK size summary
      - name: APK size report
        run: |
          echo "## Build: ${{ matrix.variant }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for apk in $(find . -name "*.apk" -path "*/${{ matrix.variant }}/*" 2>/dev/null); do
            size=$(du -h "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "- **$name**: $size" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.variant }}
          path: |
            app/build/outputs/apk/${{ matrix.variant }}/*.apk
            wear/build/outputs/apk/${{ matrix.variant }}/*.apk
          retention-days: 30
