version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: [dependencies]
    groups:
      compose:
        patterns: ["androidx.compose*"]
      kotlin:
        patterns: ["org.jetbrains.kotlin*", "com.google.devtools.ksp*"]
      hilt:
        patterns: ["com.google.dagger*", "androidx.hilt*"]
      security-crypto:
        patterns: ["com.hierynomus:sshj*", "org.bouncycastle*", "ch.acra*"]
    ignore:
      - dependency-name: "com.hierynomus:sshj"
        update-types: ["version-update:semver-major"]
      - dependency-name: "org.bouncycastle:*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
    labels: [ci]
