version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
    reviewers:
      - CallMeTechie
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
        update-types:
          - "minor"
          - "patch"
      compose:
        patterns:
          - "androidx.compose*"
        update-types:
          - "minor"
          - "patch"
      hilt:
        patterns:
          - "com.google.dagger*"
        update-types:
          - "minor"
          - "patch"
      androidx:
        patterns:
          - "androidx.*"
        exclude-patterns:
          - "androidx.compose*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "org.junit*"
          - "io.mockk*"
          - "app.cash.turbine*"
          - "com.google.truth*"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Don't auto-update Hilt past 2.58 (AGP 8.x compat)
      - dependency-name: "com.google.dagger:*"
        versions: [">=2.59"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
      - automated
    commit-message:
      prefix: "ci(deps)"
